[build]
  functions = "netlify/functions"
  publish = "."

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[functions."spotify-callback"]
  external_node_modules = ["firebase-admin"]

[functions."spotify-queue-next"]
  external_node_modules = ["firebase-admin"]

[functions."spotify-devices"]
  external_node_modules = ["firebase-admin"]

[functions."spotify-start-playback"]
  external_node_modules = ["firebase-admin"]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

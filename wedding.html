<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhiteRose | Wedding Companion</title>
    <meta name="description" content="Create your custom WhiteRose wedding companion app.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400..600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="whiterose.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="form-wrapper glass-panel">
            <header>
                <svg class="rose-mark" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M32 8c-7 2-11 8-11 14 0 7 6 12 11 12s11-5 11-12c0-6-4-12-11-14z" stroke="currentColor" stroke-width="1.4"/>
                    <path d="M24 18c2 4 2 9 0 13M40 18c-2 4-2 9 0 13M28 12c1 5 1 11 4 16M36 12c-1 5-1 11-4 16" stroke="currentColor" stroke-width="1"/>
                    <path d="M32 34v22" stroke="currentColor" stroke-width="1.4"/>
                    <path d="M32 44c-5 0-8 3-9 7M32 50c5 0 7 3 8 6" stroke="currentColor" stroke-width="1.2"/>
                </svg>
                <h1>White<span class="pop">Rose</span></h1>
                <div class="party-text">Wedding Companion</div>
            </header>

            <form id="wedding-form">
                <div class="form-grid">
                    <!-- Column 1 -->
                    <div class="grid-col">
                        <section class="form-section">
                            <h2><span class="event-text">The</span> <span class="purple-text">Couple</span></h2>
                            <div class="input-row">
                                <div class="input-group">
                                    <label for="partner1-name">Partner 1 Name *</label>
                                    <input type="text" id="partner1-name" class="req-field" placeholder="Sarah" required>
                                </div>
                                <div class="input-group">
                                    <label for="partner2-name">Partner 2 Name *</label>
                                    <input type="text" id="partner2-name" class="req-field" placeholder="John" required>
                                </div>
                            </div>
                            <div class="input-group">
                                <label for="wedding-hashtag">Wedding Hashtag</label>
                                <input type="text" id="wedding-hashtag" placeholder="#SarahAndJohn2026">
                            </div>
                        </section>

                        <section class="form-section">
                            <h2><span class="event-text">Your</span> <span class="purple-text">Look</span></h2>
                            <div class="input-group">
                                <select id="wedding-style" class="req-field custom-select" required>
                                    <option value="" disabled selected>Pick a Style...</option>
                                    <option value="classic">Classic Romance</option>
                                    <option value="modern">Modern Minimal</option>
                                    <option value="boho">Boho Garden</option>
                                    <option value="vintage">Vintage Glam</option>
                                    <option value="rustic">Rustic Charm</option>
                                </select>
                                <div class="palette-preview" id="palette-preview" aria-hidden="true"></div>
                            </div>
                        </section>

                        <section class="form-section">
                            <h2><span class="event-text">Your</span> <span class="purple-text">Day</span></h2>
                            <div class="input-group">
                                <label for="wedding-date">Wedding Date *</label>
                                <input type="date" id="wedding-date" class="req-field" required>
                            </div>
                            <div class="input-row">
                                <div class="input-group">
                                    <label for="ceremony-time">Ceremony Time</label>
                                    <input type="time" id="ceremony-time">
                                </div>
                                <div class="input-group">
                                    <label for="ceremony-venue">Ceremony Venue</label>
                                    <input type="text" id="ceremony-venue" placeholder="St. Andrew's Church">
                                </div>
                            </div>
                            <div class="input-row">
                                <div class="input-group">
                                    <label for="reception-time">Reception Time *</label>
                                    <input type="time" id="reception-time" class="req-field" required>
                                </div>
                                <div class="input-group">
                                    <label for="reception-venue">Reception Venue *</label>
                                    <input type="text" id="reception-venue" class="req-field" placeholder="The Grand Hotel, 123 Main St" required>
                                </div>
                            </div>
                        </section>
                    </div>

                    <!-- Column 2 -->
                    <div class="grid-col">
                        <section class="form-section">
                            <h2><span class="event-text">For Your</span> <span class="purple-text">Guests</span></h2>
                            <div class="input-group">
                                <label for="welcome-message">Welcome Message</label>
                                <input type="text" id="welcome-message" placeholder="Thank you for celebrating with us!">
                            </div>
                            <div class="input-row">
                                <div class="input-group">
                                    <label for="website-link">Wedding Website</label>
                                    <input type="text" id="website-link" placeholder="https://...">
                                </div>
                                <div class="input-group">
                                    <label for="registry-link">Registry Link</label>
                                    <input type="text" id="registry-link" placeholder="https://...">
                                </div>
                            </div>
                            <div class="input-group">
                                <label for="dress-code">Dress Code</label>
                                <input type="text" id="dress-code" placeholder="Black Tie Optional">
                            </div>
                        </section>

                        <section class="form-section">
                            <h2><span class="event-text">The</span> <span class="purple-text">Music</span></h2>
                            <div class="input-group">
                                <label for="dj-mode">DJ Mode</label>
                                <select id="dj-mode" class="custom-select">
                                    <option value="off">Off — no song requests</option>
                                    <option value="live" selected>Live DJ — guests vote, a human plays them</option>
                                    <option value="auto">Auto DJ — guest requests auto-queue to Spotify</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <label for="spotify-playlist">Backing Playlist (optional)</label>
                                <input type="text" id="spotify-playlist" placeholder="Paste a Spotify playlist link, or leave blank for our default wedding mix">
                            </div>
                        </section>

                        <section class="form-section">
                            <h2><span class="event-text">Your</span> <span class="purple-text">Gallery</span></h2>
                            <div class="input-group">
                                <label for="moderation-enabled">Moderation</label>
                                <select id="moderation-enabled" class="custom-select">
                                    <option value="false" selected>Off — photos post live, in a timeline</option>
                                    <option value="true">On — photos held for approval first</option>
                                </select>
                            </div>
                        </section>
                    </div>
                </div>

                <div class="form-footer">
                    <button type="button" class="btn-primary" id="btn-generate">Generate Prototype PWA</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Output / Share Section -->
    <div class="overlay" id="output-overlay" style="display: none;">
        <div class="modal glass-panel">
            <h2>Ready to Celebrate! 💍</h2>
            <p>Your custom PWA prototype is ready.</p>

            <div class="share-box">
                <label>Shareable URL</label>
                <div class="url-group">
                    <input type="text" id="share-url" readonly value="Generating...">
                    <button type="button" id="copy-btn" class="btn-icon">📋</button>
                </div>
                <div class="share-link-wrap" style="margin-top: 0.5rem; text-align: left;">
                    <a id="share-link" href="#" target="_blank" style="color: var(--rose-deep); text-decoration: underline; font-size: 0.9rem; word-break: break-all; display: none;"></a>
                </div>
            </div>
            <div class="share-box" style="margin-top: 1rem;">
                <label>Event Access & Activation Key</label>
                <div class="url-group">
                    <input type="text" id="activation-key" readonly value="Generating...">
                    <button type="button" id="copy-key-btn" class="btn-icon">📋</button>
                </div>
            </div>
            <div class="share-box" style="margin-top: 1rem;">
                <label>Admin Panel URL (Save this to moderate photos & manage music)</label>
                <div class="url-group">
                    <input type="text" id="admin-url" readonly value="Generating...">
                    <button type="button" id="copy-admin-url-btn" class="btn-icon">📋</button>
                </div>
                <div class="share-link-wrap" style="margin-top: 0.5rem; text-align: left;">
                    <a id="admin-link" href="#" target="_blank" style="color: var(--rose-deep); text-decoration: underline; font-size: 0.9rem; word-break: break-all; display: none;">Go to Admin Panel</a>
                </div>
            </div>

            <div class="qr-container">
                <div id="qrcode"></div>
                <p>Scan to test on your phone</p>
            </div>

            <button type="button" class="btn-secondary mt-1" id="btn-reset">Close & Create Another</button>
        </div>
    </div>

    <!-- Firebase SDK (Compat Version to avoid file:/// CORS issues) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="wedding.js?v=4"></script>
</body>
</html>

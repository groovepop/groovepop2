<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GROOVE POP — Offline</title>
  <link rel="icon" href="/GPicon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      max-width: 480px;
      margin: 0 auto;
    }

    .gp-mark {
      font-family: 'Bebas Neue', 'Arial Black', sans-serif;
      font-size: 3rem;
      color: #c8a84b;
      letter-spacing: 0.05em;
      line-height: 1;
      margin-bottom: 2rem;
    }

    h1 {
      font-family: 'Bebas Neue', 'Arial Black', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 0.08em;
      color: #fff;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1rem;
      color: rgba(255,255,255,0.55);
      line-height: 1.6;
      max-width: 300px;
      margin-bottom: 2rem;
    }

    .dot {
      color: #c8a84b;
    }

    button {
      background: transparent;
      border: 1.5px solid #c8a84b;
      color: #c8a84b;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.75rem 2rem;
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    button:hover, button:active {
      background: #c8a84b;
      color: #0a0a0a;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="gp-mark">GP</div>
  <h1>You're Offline<span class="dot">.</span></h1>
  <p>GROOVE POP needs a connection to generate images. Come back when you're online and we'll pick up where you left off.</p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GROOVE POP PARTY | App Builder</title>
    <meta name="description" content="Create a customized Groove Pop PWA for your next party or event.">
    <!-- Google Fonts: Outfit for headers, Inter for professional body text -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="party.css">
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="form-wrapper glass-panel">
            <header>
                <h1>GROOVE <span class="pop">POP</span></h1>
                <div class="party-text">PARTY</div>
            </header>

            <form id="party-form">
                <div class="form-grid">
                    <!-- Column 1 -->
                    <div class="grid-col">
                        <section class="form-section">
                            <h2><span class="event-text">Event</span> <span class="purple-text">Details</span></h2>
                            <div class="input-row">
                                <div class="input-group">
                                    <label for="event-name">Event Name *</label>
                                    <input type="text" id="event-name" class="req-field" placeholder="Sarah's 30th" required>
                                </div>
                                <div class="input-group">
                                    <label for="event-host">Host(s) *</label>
                                    <input type="text" id="event-host" class="req-field" placeholder="Sarah & John" required>
                                </div>
                            </div>
                            <div class="input-row">
                                <div class="input-group">
                                    <label for="event-date">Date *</label>
                                    <input type="date" id="event-date" class="req-field" required>
                                </div>
                                <div class="input-group">
                                    <label for="event-time">Start Time *</label>
                                    <input type="time" id="event-time" class="req-field" required>
                                </div>
                            </div>
                            <div class="input-group">
                                <label for="event-venue">Venue *</label>
                                <input type="text" id="event-venue" class="req-field" placeholder="The Grand Hotel, 123 Main St" required>
                            </div>
                        </section>

                        <section class="form-section">
                            <h2><span class="event-text">Event</span> <span class="purple-text">Type</span></h2>
                            <div class="input-group">
                                <select id="event-type" class="req-field custom-select">
                                    <option value="" disabled selected>Pick an Event Type...</option>
                                    <option value="wedding">Wedding / Romance</option>
                                    <option value="corporate">Corporate / Brand</option>
                                    <option value="birthday">Birthday / Celebration</option>
                                    <option value="festival">Festival / Outdoor</option>
                                    <option value="nightlife">Nightlife / Party</option>
                                </select>
                            </div>
                        </section>

                        <section class="form-section">
                            <h2><span class="event-text">Event</span> <span class="purple-text">Information</span></h2>
                            <div class="input-group">
                                <label for="welcome-message">Custom Welcome Message</label>
                                <input type="text" id="welcome-message" placeholder="Welcome to the best night ever!">
                            </div>
                            <div class="input-row">
                                <div class="input-group">
                                    <label for="rsvp-link">RSVP / Ticket Link</label>
                                    <input type="text" id="rsvp-link" placeholder="https://...">
                                </div>
                                <div class="input-group">
                                    <label for="dress-code">Dress Code</label>
                                    <input type="text" id="dress-code" placeholder="Black Tie Optional">
                                </div>
                            </div>
                        </section>
                    </div>

                    <!-- Column 2 -->
                    <div class="grid-col">
                        <section class="form-section h-100">
                            <h2><span class="event-text">Event</span> <span class="purple-text">Design</span></h2>
                            
                            <div class="palette-row">
                                <div class="input-group color-picker">
                                    <label for="bg-color">Background</label>
                                    <input type="color" id="bg-color" value="#111111">
                                </div>
                                <div class="input-group color-picker">
                                    <label for="primary-color">Text</label>
                                    <input type="color" id="primary-color" value="#f5f2ec">
                                </div>
                                <div class="input-group color-picker">
                                    <label for="accent-color">Accent</label>
                                    <input type="color" id="accent-color" value="#a00ae6">
                                </div>
                            </div>
                            
                            <div class="input-group file-upload" style="margin-top: 1rem;">
                                <label>Event Logo / Hero Image</label>
                                <div class="upload-area" id="upload-area">
                                    <span>Drag & Drop or Click to Upload</span>
                                    <input type="file" id="logo-upload" accept="image/*" hidden>
                                </div>
                            </div>

                            <div class="form-actions" style="margin-top: auto; padding-top: 2rem;">
                                <button type="button" class="btn-primary" id="btn-generate">Generate Prototype PWA</button>
                            </div>
                        </section>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Output / Share Section (Placed as direct body child so fixed positioning works correctly) -->
    <div class="overlay" id="output-overlay" style="display: none;">
        <div class="modal glass-panel">
            <h2>Ready to Party! 🚀</h2>
            <p>Your custom PWA prototype is ready.</p>
            
            <div class="share-box">
                <label>Shareable URL</label>
                <div class="url-group">
                    <input type="text" id="share-url" readonly value="Generating...">
                    <button type="button" id="copy-btn" class="btn-icon">📋</button>
                </div>
                <div class="share-link-wrap" style="margin-top: 0.5rem; text-align: left;">
                    <a id="share-link" href="#" target="_blank" style="color: var(--accent); text-decoration: underline; font-size: 0.9rem; word-break: break-all; display: none;"></a>
                </div>
            </div>
            <div class="share-box" style="margin-top: 1rem;">
                <label>Activation Key (Enter in app to activate)</label>
                <div class="url-group">
                    <input type="text" id="activation-key" readonly value="Generating...">
                    <button type="button" id="copy-key-btn" class="btn-icon">📋</button>
                </div>
            </div>

            <div class="qr-container">
                <div id="qrcode"></div>
                <p>Scan to test on your phone</p>
            </div>
            
            <button type="button" class="btn-secondary mt-1" id="btn-reset">Close & Create Another</button>
        </div>
    </div>

    <!-- Firebase SDK (Compat Version to avoid file:/// CORS issues) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="party.js?v=2"></script>
</body>
</html>
